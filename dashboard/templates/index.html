<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VuTune — IMVU Music Bot Dashboard</title>
  <meta name="description" content="VuTune IMVU Music Bot Control Panel" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ─── BACKGROUND BLOBS ─────────────────────────────────────────────── -->
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<!-- ─── TOP NAV ──────────────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="url(#lg)" stroke-width="2"/>
        <path d="M10 9v10l9-5-9-5z" fill="url(#lg)"/>
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a855f7"/>
            <stop offset="1" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="nav-title">VuTune</span>
    <span class="nav-sub">IMVU Music Bot</span>
  </div>
  <div class="nav-status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Connecting...</span>
    <span class="bot-user" id="botUser"></span>
  </div>
</nav>

<!-- ─── MAIN LAYOUT ──────────────────────────────────────────────────── -->
<main class="container">

  <!-- ── LEFT COLUMN ── -->
  <section class="col-left">

    <!-- NOW PLAYING CARD -->
    <div class="card card-player">
      <div class="card-label">NOW PLAYING</div>

      <div class="album-art" id="albumArt">
        <div class="album-placeholder" id="albumPlaceholder">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="#ffffff18" stroke-width="2"/>
            <circle cx="24" cy="24" r="8" fill="#ffffff18"/>
            <path d="M18 14v20l16-10-16-10z" fill="#ffffff30"/>
          </svg>
        </div>
        <img id="albumImg" src="" alt="Album art" style="display:none" />
        <div class="spin-ring" id="spinRing"></div>
      </div>

      <div class="song-info">
        <div class="song-title" id="songTitle">Nothing playing</div>
        <div class="song-artist" id="songArtist">—</div>
      </div>

      <!-- Visualizer bars -->
      <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="btnStop" title="Stop" onclick="apiStop()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
        </button>
        <button class="ctrl-btn ctrl-skip" id="btnSkip" title="Skip" onclick="apiSkip()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 4l10 8-10 8V4zm10 0h2v16h-2z"/>
          </svg>
        </button>
      </div>

      <!-- Play from dashboard -->
      <div class="dash-play">
        <input id="dashPlayInput" type="text" placeholder="Search a song to play... (any language)" />
        <button onclick="dashPlay()" class="btn-primary">▶ Play</button>
      </div>
      <div class="dash-play">
        <input id="dashAddInput" type="text" placeholder="Add to queue..." />
        <button onclick="dashAdd()" class="btn-secondary">+ Queue</button>
      </div>

      <div id="playFeedback" class="feedback"></div>
    </div>

  </section>

  <!-- ── RIGHT COLUMN ── -->
  <section class="col-right">

    <!-- QUEUE CARD -->
    <div class="card card-queue">
      <div class="card-header">
        <div class="card-label">QUEUE</div>
        <span class="queue-count" id="queueCount">0 songs</span>
        <button class="btn-ghost" onclick="apiClearQueue()">Clear All</button>
      </div>
      <div class="queue-list" id="queueList">
        <div class="queue-empty">Queue is empty — add a song!</div>
      </div>
    </div>

    <!-- ROOMS CARD -->
    <div class="card card-rooms">
      <div class="card-header">
        <div class="card-label">ROOMS</div>
        <span class="room-count" id="roomCount">0 rooms</span>
      </div>

      <div class="room-list" id="roomList">
        <div class="queue-empty">No rooms added yet.</div>
      </div>

      <!-- Add room -->
      <div class="add-room-form">
        <input id="roomIdInput" type="text" placeholder="Room ID (from IMVU URL)" />
        <input id="roomNameInput" type="text" placeholder="Room name (optional)" />
        <button class="btn-primary" onclick="addRoom()">+ Add Room</button>
      </div>
      <div id="roomFeedback" class="feedback"></div>
    </div>

    <!-- SETTINGS CARD -->
    <div class="card card-settings">
      <div class="card-label">SETTINGS</div>
      <div class="setting-row">
        <span>Anyone can use commands</span>
        <label class="toggle">
          <input type="checkbox" id="anyoneToggle" onchange="saveSettings()" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row" id="allowedUsersRow" style="display:none">
        <span>Allowed users (comma separated)</span>
        <input id="allowedUsersInput" type="text" placeholder="user1, user2" class="setting-input"
               onblur="saveSettings()" />
      </div>
      <div class="setting-row">
        <span>Stream URL (paste into IMVU room radio)</span>
        <div class="stream-url-display">
          <code id="streamUrl">http://localhost:8000/stream</code>
          <button class="btn-copy" onclick="copyStream()">Copy</button>
        </div>
      </div>
    </div>

  </section>

</main>

<!-- ─── TOAST NOTIFICATION ────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
